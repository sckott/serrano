name: Ruby

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        ruby: [3.0, 3.1, 3.2, 3.3, 3.4, 4.0]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: 4.0.7
      - name: Install Bundler 4.0.7
        run: gem install bundler:4.0.7
      - name: Install dependencies
        run: bundle _4.0.7_ install
      - name: Run tests
        run: |
          bundle exec rake install
          bundle exec rake test TESTOPTS="-v"
